<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic SDLC Pilot — Delivery Dashboard</title>
    <!--
      Renders the committed DASHBOARD.md as a page (Markdown + Mermaid), so the
      dashboard is viewable at the Pages URL without opening the repo. The file
      is fetched at runtime, so the site always reflects the latest committed
      DASHBOARD.md (regenerated by the `dashboard` workflow). See US-050.
    -->
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.55;
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
        color: #1f2328;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e6edf3; background: #0d1117; }
        a { color: #4493f8; }
        table, th, td { border-color: #30363d !important; }
        th { background: #161b22 !important; }
        code { background: #161b22; }
      }
      table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
      th, td { border: 1px solid #d0d7de; padding: 6px 12px; text-align: left; }
      th { background: #f6f8fa; }
      code { background: #f6f8fa; padding: 0.1em 0.35em; border-radius: 4px; font-size: 90%; }
      /* Diagrams always sit on a dark panel — vivid fills, light labels, minimal white. */
      .mermaid { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; margin: 1.25rem 0; overflow-x: auto; }
      .mermaid svg { max-width: 100%; height: auto; }
      blockquote { border-left: 4px solid #d0d7de; margin: 1rem 0; padding: 0.2rem 1rem; color: #57606a; }
      hr { border: none; border-top: 1px solid #d0d7de; margin: 2rem 0; }
      .meta { font-size: 0.85rem; color: #57606a; margin-bottom: 1.5rem; }
      .error { color: #cf222e; }
    </style>
  </head>
  <body>
    <p class="meta">
      Live render of
      <a href="https://github.com/carloshumbertoreyesortiz/agentic-sdlc-pilot/blob/main/DASHBOARD.md">DASHBOARD.md</a>
      · regenerated daily by the <code>dashboard</code> workflow.
    </p>
    <main id="content">Loading dashboard…</main>

    <script type="module">
      import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js';
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.esm.min.mjs';

      const el = document.getElementById('content');
      try {
        const res = await fetch('./DASHBOARD.md', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        el.innerHTML = marked.parse(md, { gfm: true });

        // Convert ```mermaid fenced blocks into Mermaid containers, then render.
        el.querySelectorAll('code.language-mermaid').forEach((code) => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          code.closest('pre').replaceWith(div);
        });
        // Diagrams render on a fixed dark slate panel (see .mermaid CSS) with
        // VIVID saturated fills and light labels — high contrast and very little
        // white, regardless of the visitor's light/dark OS preference. (Pale
        // fills + white labels were the earlier washed-out / white-on-white look.)
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            fontFamily:
              '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
            background: '#0f172a',
            textColor: '#e2e8f0',
            lineColor: '#64748b',
            primaryColor: '#1e293b',
            primaryTextColor: '#e2e8f0',
            primaryBorderColor: '#475569',
            // pie — saturated slices, white labels on top
            pieTitleTextColor: '#e2e8f0',
            pieSectionTextColor: '#ffffff',
            pieStrokeColor: '#0f172a',
            pieOuterStrokeColor: '#64748b',
            pieLegendTextColor: '#e2e8f0',
            pie1: '#3b82f6',
            pie2: '#f59e0b',
            pie3: '#22c55e',
            pie4: '#a855f7',
            pie5: '#ef4444',
            pie6: '#06b6d4',
            // gantt — saturated bars, light labels
            taskTextColor: '#ffffff',
            taskTextDarkColor: '#ffffff',
            taskTextLightColor: '#ffffff',
            taskTextOutsideColor: '#e2e8f0',
            taskTextClickableColor: '#e2e8f0',
            gridColor: '#334155',
            todayLineColor: '#fb923c',
            taskBkgColor: '#64748b',
            taskBorderColor: '#94a3b8',
            doneTaskBkgColor: '#22c55e',
            doneTaskBorderColor: '#16a34a',
            activeTaskBkgColor: '#3b82f6',
            activeTaskBorderColor: '#2563eb',
            critBkgColor: '#ef4444',
            critBorderColor: '#dc2626',
            sectionBkgColor: '#1e293b',
            altSectionBkgColor: '#172033',
          },
        });
        await mermaid.run({ querySelector: '.mermaid' });
      } catch (err) {
        el.innerHTML = `<p class="error">Could not load DASHBOARD.md: ${err.message}</p>`;
      }
    </script>
  </body>
</html>
