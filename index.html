<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic SDLC Pilot — Delivery Dashboard</title>
    <!--
      Renders DASHBOARD.md as a page (Markdown + Mermaid), so the dashboard is
      viewable at the Pages URL without opening the repo. The `deploy-pages`
      workflow generates DASHBOARD.md from live Issues state into the publish
      directory at deploy time, then this page fetches it at runtime — so the
      site reflects current state without a committed dashboard on main
      (US-051 / R-05). See US-050.

      Deliberately a single high-contrast DARK theme (not auto light/dark):
      graphical progress bars, dark code chips, large KPI numbers, and dark
      Mermaid panels with vivid fills — minimal white, readable everywhere.
    -->
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --chip: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #9aa4b2;
        --link: #58a6ff;
        --accent1: #3b82f6;
        --accent2: #22c55e;
      }
      html { color-scheme: dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.55;
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
        color: var(--text);
        background: var(--bg);
      }
      h1, h2, h3 { line-height: 1.25; }
      h2 { margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
      a { color: var(--link); }
      table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
      th, td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
      th { background: var(--panel); }
      code { background: var(--chip); color: #d6dee8; padding: 0.12em 0.4em; border-radius: 4px; font-size: 90%; }
      blockquote { border-left: 4px solid var(--accent1); margin: 1rem 0; padding: 0.4rem 1rem; color: var(--text); background: var(--panel); border-radius: 0 6px 6px 0; }
      hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
      .meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
      .error { color: #ff7b72; }
      /* Charts: dark slate panel, vivid fills, light labels — set in JS theme too. */
      .mermaid { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; margin: 1.25rem 0; overflow-x: auto; }
      .mermaid svg { max-width: 100%; height: auto; }
      /* Graphical progress bar (replaces the █░ text bars). */
      .pbar { display: inline-block; width: 240px; height: 14px; vertical-align: middle; background: var(--chip); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
      .pbar > i { display: block; height: 100%; width: var(--pct, 0%); background: linear-gradient(90deg, var(--accent1), var(--accent2)); }
      /* Large KPI numbers (from `## n` cells). */
      .kpi { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.01em; }
    </style>
  </head>
  <body>
    <p class="meta">
      Live render of
      <a href="https://github.com/carloshumbertoreyesortiz/agentic-sdlc-pilot/blob/main/DASHBOARD.md">DASHBOARD.md</a>
      · generated from live Issues state at deploy time by the
      <code>deploy-pages</code> workflow.
    </p>
    <main id="content">Loading dashboard…</main>

    <script type="module">
      import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js';
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.esm.min.mjs';

      const el = document.getElementById('content');
      try {
        const res = await fetch('./DASHBOARD.md', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        el.innerHTML = marked.parse(await res.text(), { gfm: true });

        // 1) Replace the █░ text progress bars with graphical bars.
        el.querySelectorAll('code').forEach((c) => {
          const t = c.textContent.trim();
          if (/^[█░]+$/.test(t)) {
            const ratio = [...t].filter((ch) => ch === '█').length / t.length;
            const bar = document.createElement('span');
            bar.className = 'pbar';
            bar.style.setProperty('--pct', `${Math.round(ratio * 100)}%`);
            bar.innerHTML = '<i></i>';
            c.replaceWith(bar);
          }
        });

        // 2) Render the `## n` KPI cells as large numbers.
        el.querySelectorAll('td, th').forEach((cell) => {
          const m = cell.textContent.match(/^##\s+(.+)$/);
          if (m) cell.innerHTML = `<span class="kpi">${m[1]}</span>`;
        });

        // 3) Convert ```mermaid fences to containers and render them.
        el.querySelectorAll('code.language-mermaid').forEach((code) => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          code.closest('pre').replaceWith(div);
        });
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            fontFamily:
              '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
            background: '#0f172a',
            textColor: '#e2e8f0',
            lineColor: '#64748b',
            primaryColor: '#1e293b',
            primaryTextColor: '#e2e8f0',
            primaryBorderColor: '#475569',
            pieTitleTextColor: '#e2e8f0',
            pieSectionTextColor: '#ffffff',
            pieStrokeColor: '#0f172a',
            pieOuterStrokeColor: '#64748b',
            pieLegendTextColor: '#e2e8f0',
            pie1: '#3b82f6',
            pie2: '#f59e0b',
            pie3: '#22c55e',
            pie4: '#a855f7',
            pie5: '#ef4444',
            pie6: '#06b6d4',
            taskTextColor: '#ffffff',
            taskTextDarkColor: '#ffffff',
            taskTextLightColor: '#ffffff',
            taskTextOutsideColor: '#e2e8f0',
            taskTextClickableColor: '#e2e8f0',
            gridColor: '#334155',
            todayLineColor: '#fb923c',
            taskBkgColor: '#64748b',
            taskBorderColor: '#94a3b8',
            doneTaskBkgColor: '#22c55e',
            doneTaskBorderColor: '#16a34a',
            activeTaskBkgColor: '#3b82f6',
            activeTaskBorderColor: '#2563eb',
            critBkgColor: '#ef4444',
            critBorderColor: '#dc2626',
            sectionBkgColor: '#1e293b',
            altSectionBkgColor: '#172033',
          },
        });
        await mermaid.run({ querySelector: '.mermaid' });
      } catch (err) {
        el.innerHTML = `<p class="error">Could not load DASHBOARD.md: ${err.message}</p>`;
      }
    </script>
  </body>
</html>
