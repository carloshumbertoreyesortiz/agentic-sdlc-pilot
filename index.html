<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic SDLC Pilot — Delivery Dashboard</title>
    <!--
      Renders the committed DASHBOARD.md as a page (Markdown + Mermaid), so the
      dashboard is viewable at the Pages URL without opening the repo. The file
      is fetched at runtime, so the site always reflects the latest committed
      DASHBOARD.md (regenerated by the `dashboard` workflow). See US-050.
    -->
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.55;
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
        color: #1f2328;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e6edf3; background: #0d1117; }
        a { color: #4493f8; }
        table, th, td { border-color: #30363d !important; }
        th { background: #161b22 !important; }
        code { background: #161b22; }
        .mermaid { background: #161b22; }
      }
      table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
      th, td { border: 1px solid #d0d7de; padding: 6px 12px; text-align: left; }
      th { background: #f6f8fa; }
      code { background: #f6f8fa; padding: 0.1em 0.35em; border-radius: 4px; font-size: 90%; }
      .mermaid { background: #f6f8fa; border-radius: 8px; padding: 1rem; margin: 1rem 0; overflow-x: auto; }
      .mermaid svg { max-width: 100%; height: auto; }
      blockquote { border-left: 4px solid #d0d7de; margin: 1rem 0; padding: 0.2rem 1rem; color: #57606a; }
      hr { border: none; border-top: 1px solid #d0d7de; margin: 2rem 0; }
      .meta { font-size: 0.85rem; color: #57606a; margin-bottom: 1.5rem; }
      .error { color: #cf222e; }
    </style>
  </head>
  <body>
    <p class="meta">
      Live render of
      <a href="https://github.com/carloshumbertoreyesortiz/agentic-sdlc-pilot/blob/main/DASHBOARD.md">DASHBOARD.md</a>
      · regenerated daily by the <code>dashboard</code> workflow.
    </p>
    <main id="content">Loading dashboard…</main>

    <script type="module">
      import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js';
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.esm.min.mjs';

      const el = document.getElementById('content');
      try {
        const res = await fetch('./DASHBOARD.md', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        el.innerHTML = marked.parse(md, { gfm: true });

        // Convert ```mermaid fenced blocks into Mermaid containers, then render.
        el.querySelectorAll('code.language-mermaid').forEach((code) => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code.textContent;
          code.closest('pre').replaceWith(div);
        });
        // Use the 'base' theme with explicit, high-contrast variables so labels
        // are never white-on-white: Gantt bar text and pie slice labels are
        // forced dark, and bars/slices get defined fills (mermaid's default
        // theme paints white labels on light fills, which vanish in light mode).
        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const fg = dark ? '#e6edf3' : '#1f2328';
        const bg = dark ? '#161b22' : '#f6f8fa';
        mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            fontFamily:
              '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
            background: bg,
            textColor: fg,
            lineColor: dark ? '#8b949e' : '#94a3b8',
            primaryColor: '#dbeafe',
            primaryTextColor: '#1f2328',
            primaryBorderColor: '#60a5fa',
            // pie — dark slice labels so they read on light slices
            pieTitleTextColor: fg,
            pieSectionTextColor: '#1f2328',
            pieStrokeColor: bg,
            pieOuterStrokeColor: dark ? '#8b949e' : '#94a3b8',
            pie1: '#60a5fa',
            pie2: '#f59e0b',
            pie3: '#34d399',
            pie4: '#a78bfa',
            pie5: '#f87171',
            pie6: '#22d3ee',
            // gantt — dark task text on defined light fills
            taskTextColor: '#1f2328',
            taskTextDarkColor: '#1f2328',
            taskTextLightColor: '#1f2328',
            taskTextOutsideColor: fg,
            taskTextClickableColor: fg,
            gridColor: dark ? '#30363d' : '#cbd5e1',
            todayLineColor: '#d93f0b',
            taskBkgColor: '#e2e8f0',
            taskBorderColor: '#94a3b8',
            doneTaskBkgColor: '#86efac',
            doneTaskBorderColor: '#16a34a',
            activeTaskBkgColor: '#93c5fd',
            activeTaskBorderColor: '#2563eb',
            critBkgColor: '#fca5a5',
            critBorderColor: '#dc2626',
            sectionBkgColor: dark ? '#1c2128' : '#eef2f7',
            altSectionBkgColor: dark ? '#161b22' : '#f8fafc',
          },
        });
        await mermaid.run({ querySelector: '.mermaid' });
      } catch (err) {
        el.innerHTML = `<p class="error">Could not load DASHBOARD.md: ${err.message}</p>`;
      }
    </script>
  </body>
</html>
