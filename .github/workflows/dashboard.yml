name: dashboard

# Regenerates DASHBOARD.md from the live Issues backlog and commits it to main
# when it changes. Gives the squad (and Per) a near-current "where are we"
# view that lives in the repo. Supports US-045 (metrics dashboard, E-10).
#
# Triggers: a daily heartbeat and manual dispatch only. Issue/milestone-event
# triggers were removed in US-049 — committing on every issue event raced with
# open PRs that also touch DASHBOARD.md (see PRs #70 and #72). Use the
# `workflow_dispatch` button for an immediate refresh between daily runs.

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC daily
  workflow_dispatch:

# Avoid overlapping runs racing on the same commit.
concurrency:
  group: dashboard
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Generate DASHBOARD.md
        env:
          GH_TOKEN: ${{ github.token }}
          DASHBOARD_REPO: ${{ github.repository }}
        run: npx tsx scripts/dashboard.ts

      - name: Commit if changed
        run: |
          if git diff --quiet -- DASHBOARD.md; then
            echo "::notice::DASHBOARD.md unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DASHBOARD.md
          git commit -m "docs(dashboard): refresh delivery dashboard [skip ci]"
          git push
